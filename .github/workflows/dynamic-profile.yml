# ─────────────────────────────────────────────────────────────────────────────
# FILE:   .github/workflows/dynamic-profile.yml
# WHAT:   Populates <!--RECENT_ACTIVITY:start--> block with recent commits
#         from all your repos (not just the profile repo)
# TOOL:   umutphp/github-action-dynamic-profile-page
# NEEDS:  No extra secrets — uses GITHUB_TOKEN automatically
# ─────────────────────────────────────────────────────────────────────────────

name: Dynamic Profile Page

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with Dynamic Commit Activity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure git for action
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-head origin main
          git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main || true

      - uses: umutphp/github-action-dynamic-profile-page@v3
        with:
          github-username: ${{ github.repository_owner }}
          user-email: labishjain7@gmail.com
          readme-file: README.md
