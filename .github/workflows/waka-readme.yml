# ─────────────────────────────────────────────────────────────────────────────
# FILE:   .github/workflows/waka-readme.yml
# WHAT:   Updates the <!--START_SECTION:waka--> block in README.md daily
# TOOL:   anmol098/waka-readme-stats
# NEEDS:  WAKATIME_API_KEY secret  →  Settings > Secrets > Actions
#         GH_TOKEN secret          →  GitHub PAT with `repo` scope
# ─────────────────────────────────────────────────────────────────────────────

name: Waka Readme Stats

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # ── Display toggles ─────────────────────────────────────────────
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_COMMIT: "True"
          SHOW_TIMEZONE: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_LANGUAGE: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_LOC_CHART: "False"
          SHOW_PROFILE_VIEWS: "False"
          LOCALE: "en"
