# ─────────────────────────────────────────────────────────────────────────────
# FILE:   .github/workflows/snake.yml
# WHAT:   Generates the contribution snake SVG and pushes to `output` branch
# TOOL:   Platane/snk (guilyx style)
# NEEDS:  `output` branch must exist — see SETUP.md for one-time setup command
# ─────────────────────────────────────────────────────────────────────────────

name: Generate Snake Animation

on:
  schedule:
    # Runs every day at 1am UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate Snake SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate light + dark snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
